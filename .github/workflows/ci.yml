name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: python -m pip install -e .[dev]
      - run: python -m compileall -q src
      - run: python -m pytest -q

  clean-install:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Clean-host wheel, doctor, and 17-tool MCP gate
        run: >-
          python packaging/clean_host_check.py
          --report clean-host-${{ runner.os }}.json
      - name: Upload clean-host evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: clean-host-${{ runner.os }}
          path: clean-host-*.json

